<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9de4c8"/>
      <stop offset="50%" stop-color="#b8d8ee"/>
      <stop offset="100%" stop-color="#a0c8e8"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="20" y1="15" x2="80" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#cbc6b2"/>
      <stop offset="45%" stop-color="#e6e1d2"/>
      <stop offset="100%" stop-color="#d4cfc0"/>
    </linearGradient>
    <linearGradient id="shadow-ribbon" x1="20" y1="15" x2="80" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9e9a8c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9e9a8c" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.5" dy="2" stdDeviation="2.5" flood-color="rgba(0,60,50,0.22)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" ry="22" fill="white" opacity="0.12"/>

  <!-- Depth layer -->
  <path d="M 26,74 C 9,58 21,50 50,50 C 79,50 91,42 74,26"
        stroke="url(#shadow-ribbon)" stroke-width="19" stroke-linecap="round" fill="none"/>

  <!-- Main ribbon -->
  <path d="M 26,74 C 9,58 21,50 50,50 C 79,50 91,42 74,26"
        stroke="url(#ribbon)" stroke-width="14" stroke-linecap="round" fill="none"
        filter="url(#drop)"/>

  <!-- Highlight -->
  <path d="M 29,70 C 14,56 24,50 50,50 C 76,50 86,43 71,29"
        stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Top-right arrowhead -->
  <polygon points="80,20 68,23 71,35" fill="url(#ribbon)" filter="url(#drop)"/>
  <polygon points="80,20 68,23 71,28" fill="white" opacity="0.3"/>

  <!-- Bottom-left arrowhead -->
  <polygon points="20,80 32,77 29,65" fill="url(#ribbon)" filter="url(#drop)"/>
  <polygon points="20,80 32,77 29,72" fill="white" opacity="0.3"/>
</svg>
